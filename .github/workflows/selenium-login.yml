name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Project Dependencies
        run: npm ci || npm install
        env:
          VITE_SUPABASE_URL: https://apestyiapotoonphzpzu.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwZXN0eWlhcG90b29ucGh6cHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTUxMDAsImV4cCI6MjA5NDA5MTEwMH0.IDb7hUSze54i485r-ube0XGGIy7CI2bXJGmtMEmT5Yc

      - name: Install Test Dependencies
        run: |
          cd selenium-tests
          npm ci || npm install

      - name: Build Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://apestyiapotoonphzpzu.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwZXN0eWlhcG90b29ucGh6cHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTUxMDAsImV4cCI6MjA5NDA5MTEwMH0.IDb7hUSze54i485r-ube0XGGIy7CI2bXJGmtMEmT5Yc
          SUPABASE_URL: https://apestyiapotoonphzpzu.supabase.co
          SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwZXN0eWlhcG90b29ucGh6cHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTUxMDAsImV4cCI6MjA5NDA5MTEwMH0.IDb7hUSze54i485r-ube0XGGIy7CI2bXJGmtMEmT5Yc

      - name: Serve Built App
        run: npx serve dist/client -p 8080 --single &

      - name: Wait for Server to be Ready
        run: npx wait-on http://localhost:8080 --timeout 60000

      - name: Run Selenium E2E Tests
        run: |
          cd selenium-tests
          npm test

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
          publish_branch: gh-pages

